apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: {{ node_role }}
  name: 99-{{ node_role }}-ib-core-netns
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - contents:
          source: data:text/plain;base64,{{ ib_core.stdout }}
        mode: 420
        overwrite: true
        path: /etc/modprobe.d/ib_core.conf
