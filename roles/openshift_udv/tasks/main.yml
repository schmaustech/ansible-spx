- name: Execute the install script
  ansible.builtin.shell: bash ./roles/openshift_udv/scripts/remote-gpu-nic-rail-mapping.sh -g {{ udv_gpuid }} -n {{ udv_nicid }} -u {{ udv_persist_name }} -r {{ udv_role }} -c {{ udv_nodename }}
  register: script_output

- name: Display script output
  ansible.builtin.debug:
    var: script_output.stdout_lines

- name: Ingest UDEV Rules
  ansible.builtin.shell: cat {{ udv_persist_name }}| base64 -w 0
  register: udv_base64_rules

- name: Display script output
  ansible.builtin.debug:
    var: udv_base64_rules.stdout_lines

- name: Display rendered template to stdout
  ansible.builtin.debug:
    msg: "{{ lookup('ansible.builtin.template', '99-machine-config-udev-network.yaml') }}"

