- name: Waiting Since {{ lookup("pipe", "date +%r") }} for the Instance to Deploy
  kubernetes.core.k8s_info:
    api_version: '{{ api_operator_version }}'
    kind: '{{ kind_name }}'
    name: '{{ instance_name }}'
    namespace: '{{ instance_namespace }}'
  register: instance_csv
  until:
    - instance_csv.resources.0.status is defined
    - instance_csv.resources.0.status.state is defined
    - instance_csv.resources.0.status.state == 'ready'
  failed_when: False
  retries: 300
  delay: 10
