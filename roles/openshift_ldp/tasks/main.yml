- name: Create {{ lldpd_service_account }} service account...
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'ldp-lldpd-serviceaccount.yaml') }}"

- name: Ensure {{ lldpd_service_account }} service account exists...
  kubernetes.core.k8s:
    api_version: v1
    kind: ServiceAccount
    name: "{{ lldpd_service_account }}"
    namespace: "{{ lldpd_namespace }}"
    state: present

- name: Create {{ lldpd_service_account }} service account...
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'ldp-lldpd-clusterrolebinding.yaml') }}"

- name: Deploy Lldpd Daemonset...
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'ldp-lldpd-daemonset.yaml') }}"

- name: Waiting Since {{ lookup("pipe", "date +%r") }} for the Daemonset to deploy...
  kubernetes.core.k8s_info:
    api_version: 'apps/v1'
    kind: 'DaemonSet'
    name: '{{ lldpd_name }}'
    namespace: '{{ lldpd_namespace }}'
  register: daemonset_state
  until:
    - daemonset_state.resources.0.status is defined
    - daemonset_state.resources.0.status.desiredNumberScheduled == daemonset_state.resources.0.status.currentNumberScheduled
  failed_when: False
  retries: 300
  delay: 10
